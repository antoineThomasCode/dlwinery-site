  <g transform="translate(150,200)" opacity="0.35">
    <!-- Bottle body -->
    <path d="M-20,60 L-20,-20 Q-20,-35 -12,-45 L-12,-80 Q-12,-85 -8,-85 L8,-85 Q12,-85 12,-80 L12,-45 Q20,-35 20,-20 L20,60 Q20,80 0,80 Q-20,80 -20,60Z" fill="#D7A45E"/>
